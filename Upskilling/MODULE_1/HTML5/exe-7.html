<!DOCTYPE html>
<html>
<head>

<script>

function videoReady(){
    document.getElementById("status").innerHTML =
    "Video Ready To Play";
}

window.onbeforeunload=function(){
    return "Your form is not saved!";
};

</script>

</head>
<body>

<video width="400" controls oncanplay="videoReady()">
    <source src="promo.mp4" type="video/mp4">
</video>

<p id="status"></p>

</body>
</html>
